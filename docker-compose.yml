version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hrms_db
    restart: always
    environment:
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: hrms_password
      POSTGRES_DB: hrms_db
    ports:
      - "5432:5432"
    volumes:
      - hrms_db_data:/var/lib/postgresql/data
      - ./hrms_complete_schema_v2.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - hrms_redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_backend
    depends_on:
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hrms_user:hrms_password@db:5432/hrms_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - APP_ENV=development
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_worker
    command: celery -A app.tasks.worker worker --loglevel=info
    depends_on:
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hrms_user:hrms_password@db:5432/hrms_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./backend:/app

volumes:
  hrms_db_data:
  hrms_redis_data:
