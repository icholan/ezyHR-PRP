version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - hrms_redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_backend
    depends_on:
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hrms_user:hrms_password@db:5432/hrms_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - APP_ENV=development
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_worker
    command: celery -A app.tasks.worker worker --loglevel=info
    depends_on:
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hrms_user:hrms_password@db:5432/hrms_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./backend:/app

volumes:
  hrms_redis_data:
