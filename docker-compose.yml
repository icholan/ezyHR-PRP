version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - hrms_redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_backend
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - APP_ENV=development
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_worker
    command: celery -A app.tasks.worker worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - APP_ENV=development
    volumes:
      - ./backend:/app

volumes:
  hrms_redis_data:
